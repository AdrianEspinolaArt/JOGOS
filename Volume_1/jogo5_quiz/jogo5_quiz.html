<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>O CAMINHO DOS SONHOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #da5d64;
            --primary-dark: #d92f4f;
            --secondary: #1b9638;
            --bg-gradient: linear-gradient(135deg, #6cb52d 0%, #1b9638 100%);
        }

        html, body { height: 100%; }
        body {
            font-family: 'Fredoka One', cursive, sans-serif;
            background: var(--bg-gradient);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: var(--primary);
            text-transform: uppercase;
            overflow-x: hidden;
        }

        .hidden { display: none !important; }

        .screen {
            width: 95%;
            max-width: 650px;
            padding: 30px;
            box-sizing: border-box;
            animation: fadeIn 0.5s ease;
            background: white;
            border-radius: 30px;
            border: 6px solid var(--primary);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-title {
            margin: 0 0 15px;
            font-size: 2rem;
            color: var(--primary);
            text-shadow: 2px 2px 0 rgba(0,0,0,0.08);
        }

        .btn-primary {
            padding: 15px 40px;
            font-family: inherit;
            font-size: 1.3rem;
            background-color: var(--primary);
            color: white;
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 0 var(--primary-dark);
            text-transform: uppercase;
            transition: all 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 var(--primary-dark);
        }
        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 var(--primary-dark);
        }

        .instructions-box {
            background: rgba(255,255,255,0.9);
            padding: 20px 25px;
            border-radius: 20px;
            border: 3px dashed var(--primary);
            margin: 15px 0 25px;
            font-size: 1.1rem;
            line-height: 1.7;
            color: #555;
        }

        .emoji-big { font-size: 5rem; display: block; margin-bottom: 10px; }

        .floating { animation: floating 3s ease-in-out infinite; }
        @keyframes floating {
            0% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0); }
        }

        /* Header do jogo */
        .header-bar {
            display: flex;
            justify-content: space-between;
            width: 100%;
            background: white;
            padding: 10px 20px;
            border-radius: 50px;
            border: 3px solid var(--primary);
            box-shadow: 0 4px 0 rgba(0,0,0,0.06);
            margin-bottom: 15px;
            box-sizing: border-box;
            font-size: 1rem;
            color: var(--primary);
        }

        .question-text {
            font-size: 1.25rem;
            color: var(--primary);
            margin: 10px 0;
            min-height: 50px;
            line-height: 1.4;
        }

        .visual-cue {
            font-size: 4rem;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
        }

        .btn-option {
            background: white;
            border: 4px solid #e0e0e0;
            border-radius: 15px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            text-transform: uppercase;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            color: var(--primary);
            width: 100%;
            box-sizing: border-box;
        }
        .btn-option:hover { border-color: var(--primary); background: #fff5f5; }
        .btn-option:active { transform: scale(0.95); }
        .btn-option.correct { border-color: var(--secondary); background: #e8f5e9; }
        .btn-option.wrong { border-color: #e53935; background: #ffebee; animation: shake 0.5s; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .option-text { font-size: 1rem; font-weight: bold; text-align: left; flex: 1; padding-right: 10px; }
        .option-icon { font-size: 2.5rem; flex-shrink: 0; }

        .feedback { margin-top: 10px; height: 30px; font-size: 1.1rem; text-align: center; }
        .feedback.success { color: var(--secondary); }
        .feedback.error { color: #e53935; }

        /* Tela final */
        .trophy { font-size: 5rem; display: block; margin-bottom: 15px; filter: drop-shadow(0 0 15px gold); }
        .final-title { font-size: 2.2rem; color: var(--secondary); margin-bottom: 15px; }
        .final-message { font-size: 1.1rem; color: #555; line-height: 1.7; margin-bottom: 25px; }
        .final-score-number { font-size: 2.5rem; color: var(--primary); }

        .gaivota-container {
            width: 60px; height: 60px;
            display: flex; align-items: center; justify-content: center;
        }

        @media (max-width: 500px) {
            .screen { padding: 20px 15px; }
            .game-title { font-size: 1.6rem; }
            .question-text { font-size: 1.05rem; }
            .btn-primary { padding: 12px 30px; font-size: 1.1rem; }
            .header-bar { font-size: 0.85rem; padding: 8px 15px; }
        }
    </style>
</head>
<body>

    <!-- TELA INICIAL -->
    <div id="start-screen" class="screen">
        <span class="emoji-big floating">🥛</span>
        <h1 class="game-title">O CAMINHO DOS SONHOS</h1>
        <div class="instructions-box">
            AJUDE A MENINA DO LEITE A FAZER SEUS PLANOS!<br><br>
            LEIA A PERGUNTA E ESCOLHA A RESPOSTA CORRETA.
        </div>
        <button class="btn-primary" onclick="startGame()">COMEÇAR!</button>
    </div>

    <!-- TELA DO JOGO -->
    <div id="game-screen" class="screen hidden">
        <div class="header-bar">
            <div>PASSO: <span id="current-step-display">1/7</span></div>
            <div>ACERTOS: <span id="score-display" style="color: var(--secondary);">0</span></div>
        </div>
        <h2 id="question-text" class="question-text">CARREGANDO...</h2>
        <div id="visual-cue" class="visual-cue floating"></div>
        <div id="options-container" class="options-container"></div>
        <div id="mini-feedback" class="feedback"></div>
    </div>

    <!-- TELA FINAL -->
    <div id="final-screen" class="screen hidden">
        <span class="trophy">🏆</span>
        <h2 class="final-title">PARABÉNS!</h2>
        <p class="final-message">
            VOCÊ TERMINOU O CAMINHO DOS SONHOS!<br><br>
            VOCÊ ACERTOU <span id="final-score" class="final-score-number">0</span> VEZES!
        </p>
        <button class="btn-primary" onclick="location.reload()">JOGAR DE NOVO ↺</button>
    </div>

    <script>
        // SVG detalhado da gaivota (branco com asas cinzas) inspirado no Vecteezy
        const detailedSeagull = `
            <svg class="w-full h-full" viewBox="0 0 100 100">
                <!-- Pernas -->
                <path d="M45 75 L42 85 M55 75 L58 85" stroke="orange" stroke-width="3" fill="none"/>
                <!-- Corpo -->
                <ellipse cx="50" cy="55" rx="25" ry="20" fill="white" stroke="#CBD5E1" stroke-width="1"/>
                <!-- Pescoço e Cabeça -->
                <path d="M65 50 Q75 45 75 30 Q75 20 65 20 Q55 20 55 35" fill="white" stroke="#CBD5E1" stroke-width="1"/>
                <!-- Olho -->
                <circle cx="68" cy="28" r="1.5" fill="black"/>
                <!-- Bico -->
                <path d="M75 30 L85 33 L75 36 Z" fill="orange"/>
                <!-- Asa Cinza -->
                <path d="M30 50 Q45 35 60 55 Q45 65 30 50" fill="#94A3B8" stroke="#64748B" stroke-width="1"/>
                <!-- Detalhe da Asa -->
                <path d="M35 52 Q45 45 55 55" fill="none" stroke="#64748B" stroke-width="1"/>
            </svg>
        `;

        const questions = [
            {
                q: "A MENINA TEM UMA LATA DE LEITE. O QUE ELA VAI COMPRAR PRIMEIRO?",
                options: [
                    { text: "OVOS", correct: true, icon: "🥚" },
                    { text: "PINTINHOS", correct: false, icon: "🐥" },
                    { text: "ESPIGAS DE MILHO", correct: false, icon: "🌽" }
                ],
                cue: "🥛"
            },
            {
                q: "DOS OVOS VÃO NASCER MUITOS...",
                options: [
                    { text: "PINTINHOS", correct: true, icon: "🐥" },
                    { text: "PATINHOS", correct: false, icon: "🦆" },
                    { text: "PASSARINHOS", correct: false, icon: "🐦" }
                ],
                cue: "🥚"
            },
            {
                q: "OS PINTINHOS VÃO CRESCER E VIRAR LINDAS...",
                options: [
                    { text: "GALINHAS", correct: true, icon: "🐔" },
                    { text: "POMBAS", correct: false, icon: "🕊️" },
                    { text: "GAIVOTAS", correct: false, isDetailedSeagull: true }
                ],
                cue: "🐥"
            },
            {
                q: "DEPOIS DE VENDER AS GALINHAS, ELA VAI COMPRAR UMA...",
                options: [
                    { text: "CABRITA", correct: true, icon: "🐐" },
                    { text: "OVELHA", correct: false, icon: "🐑" },
                    { text: "COELHA", correct: false, icon: "🐇" }
                ],
                cue: "🐔"
            },
            {
                q: "ALÉM DA CABRITA, ELA VAI COMPRAR ALGUMAS:",
                options: [
                    { text: "PORCAS", correct: true, icon: "🐖" },
                    { text: "GALINHAS", correct: false, icon: "🐔" },
                    { text: "OVELHAS", correct: false, icon: "🐑" }
                ],
                cue: "🐐"
            },
            {
                q: "AS PORCAS VÃO TER VÁRIOS:",
                options: [
                    { text: "LEITÕES", correct: true, icon: "🐷" },
                    { text: "BEZERROS", correct: false, icon: "🐄" },
                    { text: "PORQUINHOS-DA-ÍNDIA", correct: false, icon: "🐹" }
                ],
                cue: "🐖"
            },
            {
                q: "O QUE ACONTECEU COM A MENINA NO FINAL DA HISTÓRIA?",
                options: [
                    { text: "ELA CAIU E PERDEU TODO O LEITE", correct: true, icon: "💥" },
                    { text: "ELA FICOU RICA", correct: false, icon: "💰" },
                    { text: "ELA COMPROU UMA VACA", correct: false, icon: "🐄" }
                ],
                cue: "👧"
            }
        ];

        let currentQuestion = 0;
        let score = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const data = questions[currentQuestion];
            document.getElementById('question-text').textContent = data.q;
            
            const cueContainer = document.getElementById('visual-cue');
            cueContainer.innerHTML = (data.cue === '👧') ? '<span>👧</span>' : `<span>${data.cue}</span>`;
            
            document.getElementById('current-step-display').textContent = `${currentQuestion + 1}/${questions.length}`;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            const shuffledOptions = [...data.options].sort(() => Math.random() - 0.5);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = "btn-option";
                
                let visualHtml = '';
                if (opt.isDetailedSeagull) {
                    visualHtml = `<div class="gaivota-container">${detailedSeagull}</div>`;
                } else {
                    visualHtml = `<span class="option-icon">${opt.icon}</span>`;
                }

                btn.innerHTML = `
                    <span class="option-text">${opt.text}</span>
                    ${visualHtml}
                `;
                btn.onclick = () => checkAnswer(opt.correct, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(isCorrect, element) {
            const feedback = document.getElementById('mini-feedback');
            const btns = document.querySelectorAll('.btn-option');
            
            btns.forEach(b => b.style.pointerEvents = 'none');

            if (isCorrect) {
                score++;
                document.getElementById('score-display').textContent = score;
                element.classList.add('correct');
                feedback.textContent = "MUITO BEM! 🌟";
                feedback.className = "feedback success";
                
                setTimeout(() => {
                    currentQuestion++;
                    if (currentQuestion < questions.length) {
                        feedback.textContent = "";
                        showQuestion();
                    } else {
                        showFinal();
                    }
                }, 1200);
            } else {
                element.classList.add('wrong');
                feedback.textContent = "TENTE OUTRA VEZ! 💪";
                feedback.className = "feedback error";
                setTimeout(() => {
                    element.classList.remove('wrong');
                    btns.forEach(b => b.style.pointerEvents = 'auto');
                }, 1000);
            }
        }

        function showFinal() {
            document.getElementById('game-screen').classList.add('hidden');
            document.getElementById('final-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
        }
    </script>
</body>
</html>
