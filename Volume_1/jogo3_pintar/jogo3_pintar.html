<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>JOGO DE PINTAR – A FORMIGA</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
  :root {
    --primary: #da5d64;
            --primary-dark: #d92f4f;
            --secondary: #1b9638;
            --bg-gradient: linear-gradient(135deg, #6cb52d 0%, #1b9638 100%);
  }

  html,body{height:100%;}
  body {
      font-family: 'Fredoka One', cursive, sans-serif;
      background: var(--bg-gradient);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: var(--primary);
  }

  .game-title {
      margin: 20px 0 10px;
      font-size: 2rem;
      color: white;
      text-shadow: 4px 4px 0 var(--primary);
  }

  .top-controls {
      display: flex;
      gap: 15px;
      align-items: center;
  }

  .timer {
      font-size: 1.3rem;
      background: var(--primary);
      color: white;
      padding: 5px 20px;
      border-radius: 50px;
      border: 3px solid white;
  }

  .box {
      background: white;
      padding: 15px 25px;
      border-radius: 15px;
      border: 3px solid var(--primary);
      box-shadow: 0 6px 0 rgba(0,0,0,0.1);
      margin: 15px 0;
      text-align: center;
  }

  .btn-primary {
      padding: 12px 20px;
      font-family: inherit;
      font-size: 1rem;
      background-color: var(--primary);
      color: white;
      border: 2px solid white;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 0 var(--primary-dark);
      text-transform: uppercase;
  }

  .btn-primary:active {transform: translateY(4px);box-shadow: 0 2px 0 var(--primary-dark);}

  .game-container {width:94%;max-width:850px;}

    #start-screen {
      width: 94%;
      max-width: 760px;
      background: white;
      border-radius: 20px;
      border: 5px solid var(--primary);
      box-shadow: 0 10px 0 rgba(0,0,0,0.12);
      padding: 22px;
      text-align: center;
      margin-top: 10px;
    }

    #start-screen h2 {
      color: var(--primary);
      margin: 0 0 12px;
      font-size: 1.4rem;
    }

    #start-screen p {
      color: #4a4a4a;
      font-size: 1rem;
      line-height: 1.4;
      margin: 10px 0;
    }

  /* Thumb row */
  .thumb-row{display:flex;gap:12px;align-items:center;justify-content:center;margin:10px 0;flex-wrap:wrap}
  .thumb{width:70px;height:auto;border-radius:10px;border:4px solid transparent;cursor:pointer;background:white;padding:4px;box-shadow:0 3px 0 rgba(0,0,0,0.1);transition:border-color .2s}
  .thumb.active{border-color:var(--primary)}

  /* Toolbar */
  .toolbar{display:flex;gap:10px;align-items:center;justify-content:center;background:white;padding:8px 16px;border-radius:12px;border:3px solid var(--primary);box-shadow:0 4px 0 rgba(0,0,0,0.1);margin-bottom:10px;flex-wrap:wrap}
  .toolbar label{font-size:.9rem;color:var(--primary)}
  .size-btn{width:42px;height:42px;border-radius:50%;border:3px solid var(--primary);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;font-size:.75rem;color:var(--primary);font-weight:bold;transition:all .15s}
  .size-btn.selected{background:var(--primary);color:white}
  .size-btn:active{transform:scale(.9)}
  .size-dot{display:block;border-radius:50%;background:currentColor}

  /* Paint layout: palette left + canvas right */
  .paint-layout{display:flex;gap:10px;align-items:flex-start}

  /* Palette - vertical sidebar */
  .palette{display:flex;flex-direction:column;gap:8px;padding:8px;background:white;border-radius:15px;border:3px solid var(--primary);box-shadow:0 4px 0 rgba(0,0,0,0.1)}
  .color-swatch{width:38px;height:38px;border-radius:50%;cursor:pointer;border:4px solid transparent;box-shadow:0 3px 0 rgba(0,0,0,0.12);flex-shrink:0;transition:transform .1s}
  .color-swatch:active{transform:scale(.9)}
  .color-swatch.selected{outline:3px solid var(--primary);outline-offset:3px}
  .color-swatch.eraser{background:#f8f8f8 !important;position:relative;border:3px dashed #aaa;display:flex;align-items:center;justify-content:center}
  .eraser-icon{
    width:22px;
    height:12px;
    border-radius:4px;
    transform:rotate(-32deg);
    position:relative;
    background: linear-gradient(90deg, #f0f0f0 0 52%, #de6d86 52% 100%);
    border:1px solid rgba(0,0,0,0.2);
    box-shadow: 1px 1px 0 rgba(0,0,0,0.12);
  }
  .eraser-icon::before{
    content:'';
    position:absolute;
    right:-5px;
    top:0;
    width:5px;
    height:12px;
    border-radius:0 3px 3px 0;
    background:#a0526b;
  }

  /* Board area */
  .board-area{flex:1;min-width:0;position:relative;background:white;border:6px solid var(--primary);border-radius:20px;padding:10px;box-sizing:border-box}

  @media (max-width:580px){
    .paint-layout{flex-direction:column}
    .palette{flex-direction:row;flex-wrap:wrap;justify-content:center}
    .color-swatch{width:32px;height:32px}
    .toolbar{gap:6px;padding:6px 10px}
    .size-btn{width:36px;height:36px}
    #start-screen{padding:16px}
    #start-screen h2{font-size:1.2rem}
    #start-screen p{font-size:.92rem}
  }
  </style>
</head>
<body>

  <h1 class="game-title">JOGO DE PINTAR</h1>

  <div id="start-screen">
    <h2>COMO JOGAR</h2>
    <p>Escolha uma cor e pinte livremente sobre a imagem.</p>
    <p>Use a BORRACHA para apagar e REINICIAR para limpar tudo.</p>
    <button class="btn-primary" id="start-btn" style="margin-top:10px">COMEÇAR</button>
  </div>

  <div class="game-container" id="game-container" style="display:none;">
    <!-- Escolha de imagem + reiniciar -->
    <div class="thumb-row">
      <img class="thumb active" src="quadro1.png" data-src="quadro1.png" alt="Quadro 1">
      <img class="thumb" src="quadro2.png" data-src="quadro2.png" alt="Quadro 2">

      <span style="font-size:.9rem;color:var(--primary)">PINCEL:</span>

      <button class="size-btn selected" data-size="18" title="Médio"><span class="size-dot" style="width:12px;height:12px"></span></button>
      <button class="size-btn" data-size="32" title="Grosso"><span class="size-dot" style="width:18px;height:18px"></span></button>
    </div>

    <!-- Área de pintura: paleta vertical + canvas -->
    <div class="paint-layout">
      <div class="palette" id="palette">
        <div class="color-swatch selected" data-color="#E53935" title="Vermelho" style="background:#E53935"></div>
        <div class="color-swatch" data-color="#1E88E5" title="Azul" style="background:#1E88E5"></div>
        <div class="color-swatch" data-color="#43A047" title="Verde" style="background:#43A047"></div>
        <div class="color-swatch" data-color="#FDD835" title="Amarelo" style="background:#FDD835"></div>
        <div class="color-swatch" data-color="#8E24AA" title="Roxo" style="background:#8E24AA"></div>
        <div class="color-swatch" data-color="#FF4081" title="Rosa" style="background:#FF4081"></div>
        <div class="color-swatch" data-color="#FB8C00" title="Laranja" style="background:#FB8C00"></div>
        <div class="color-swatch" data-color="#FFFFFF" title="Branco" style="background:#FFFFFF;border:3px solid #ccc"></div>
        <div class="color-swatch" data-color="#000000" title="Preto" style="background:#000000"></div>
        <div class="color-swatch eraser" data-color="eraser" title="Borracha"><span class="eraser-icon" aria-hidden="true"></span></div>

  <script>
  (function(){
    const paletteEl = document.getElementById('palette');
    const startScreen = document.getElementById('start-screen');
    const startBtn = document.getElementById('start-btn');
    const gameContainer = document.getElementById('game-container');
    const restartBtn = document.getElementById('restart-btn');
    const boardArea = document.getElementById('board-area');
    const paintCanvas = document.getElementById('paintCanvas');
    const paintCtx = paintCanvas.getContext('2d');
    const mainImage = document.getElementById('mainImage');
    const thumbs = Array.from(document.querySelectorAll('.thumb'));
    const sizeBtns = document.querySelectorAll('.size-btn');

    let activeColor = '#E53935';
    let isEraser = false;
    let drawing = false;
    let lastX = 0, lastY = 0;
    let lineWidth = 18;

    /* ── Palette ── */
    paletteEl.addEventListener('click', e => {
      const sw = e.target.closest('.color-swatch');
      if (!sw) return;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      sw.classList.add('selected');
      const color = sw.getAttribute('data-color');
      if (color === 'eraser') {
        isEraser = true;
        paintCanvas.style.cursor = 'cell';
      } else {
        isEraser = false;
        activeColor = color;
        paintCanvas.style.cursor = 'crosshair';
      }
    });

    /* ── Brush size ── */
    sizeBtns.forEach(btn => btn.addEventListener('click', () => {
      sizeBtns.forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      lineWidth = parseInt(btn.getAttribute('data-size'));
    }));

    /* ── Canvas helpers ── */
    function fillWhite() {
      paintCtx.fillStyle = '#FFFFFF';
      paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
    }

    function clearDrawing() { fillWhite(); }

    function restart() {
      clearDrawing();
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
      const first = document.querySelector('.color-swatch');
      if (first) first.classList.add('selected');
      activeColor = first?.getAttribute('data-color') || '#E53935';
      isEraser = false;
      paintCanvas.style.cursor = 'crosshair';
      sizeBtns.forEach(b => b.classList.remove('selected'));
      const medBtn = document.querySelector('.size-btn[data-size="18"]');
      if (medBtn) medBtn.classList.add('selected');
      lineWidth = 18;
    }

    /* ── Pointer math ── */
    function getPointerPos(e) {
      const rect = paintCanvas.getBoundingClientRect();
      let cx, cy;
      if (e.touches && e.touches[0]) { cx = e.touches[0].clientX; cy = e.touches[0].clientY; }
      else { cx = e.clientX; cy = e.clientY; }
      return {
        x: (cx - rect.left) * (paintCanvas.width / rect.width),
        y: (cy - rect.top) * (paintCanvas.height / rect.height)
      };
    }

    function currentColor() { return isEraser ? '#FFFFFF' : (activeColor || '#000'); }

    function pointerDown(e) {
      e.preventDefault();
      drawing = true;
      const p = getPointerPos(e);
      lastX = p.x; lastY = p.y;
      // dot on single tap
      paintCtx.fillStyle = currentColor();
      paintCtx.beginPath();
      paintCtx.arc(p.x, p.y, lineWidth / 2, 0, Math.PI * 2);
      paintCtx.fill();
    }

    function pointerMove(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = getPointerPos(e);
      paintCtx.strokeStyle = currentColor();
      paintCtx.lineWidth = lineWidth;
      paintCtx.lineJoin = 'round';
      paintCtx.lineCap = 'round';
      paintCtx.beginPath();
      paintCtx.moveTo(lastX, lastY);
      paintCtx.lineTo(p.x, p.y);
      paintCtx.stroke();
      lastX = p.x; lastY = p.y;
    }

    function pointerUp() { drawing = false; }

    restartBtn.addEventListener('click', () => restart());

    /* ── Image loading ── */
    function resizeCanvasToImage(img) {
      const cw = boardArea.clientWidth - 20;
      const scale = cw / img.naturalWidth;
      const w = Math.round(img.naturalWidth * scale);
      const h = Math.round(img.naturalHeight * scale);
      paintCanvas.width = w;
      paintCanvas.height = h;
      paintCanvas.style.width = '100%';
      paintCanvas.style.height = 'auto';
      mainImage.style.width = '100%';
      mainImage.style.height = 'auto';
      mainImage.style.left = '0';
      mainImage.style.top = '0';
      fillWhite();
    }

    function loadImageSource(src) {
      const img = new Image();
      img.onload = function () {
        mainImage.src = src;
        resizeCanvasToImage(img);
      };
      img.src = src;
      if (img.complete) {
        mainImage.src = src;
        resizeCanvasToImage(img);
      }
    }

    /* ── Thumbnails ── */
    thumbs.forEach(t => t.addEventListener('click', () => {
      thumbs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      loadImageSource(t.getAttribute('data-src'));
    }));

    /* ── Init ── */
    document.addEventListener('DOMContentLoaded', () => {
      paintCanvas.addEventListener('pointerdown', pointerDown);
      window.addEventListener('pointermove', pointerMove);
      window.addEventListener('pointerup', pointerUp);
      paintCanvas.addEventListener('touchstart', pointerDown, { passive: false });
      window.addEventListener('touchmove', pointerMove, { passive: false });
      window.addEventListener('touchend', pointerUp);

      window.addEventListener('resize', () => {
        const img = new Image();
        img.src = mainImage.src;
        img.onload = () => resizeCanvasToImage(img);
        if (img.complete) resizeCanvasToImage(img);
      });

      startBtn.addEventListener('click', () => {
        startScreen.style.display = 'none';
        gameContainer.style.display = 'block';
        paintCanvas.style.cursor = 'crosshair';
        const firstThumb = document.querySelector('.thumb');
        if (firstThumb) {
          firstThumb.classList.add('active');
          loadImageSource(firstThumb.getAttribute('data-src'));
        }
      });
    });
  })();
  </script>

</body>
</html>
