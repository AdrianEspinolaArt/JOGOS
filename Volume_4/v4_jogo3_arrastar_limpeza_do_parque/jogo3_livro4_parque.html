<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Limpeza do Parque - Jogo de Reciclagem</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap');

        body {
            font-family: 'Fredoka One', cursive;
            overflow: hidden;
            touch-action: none; 
            user-select: none;
            margin: 0;
            padding: 0;
        }

        .park-bg {
            background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 50%, #90ee90 50%, #228b22 100%);
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        .sun {
            position: absolute;
            top: 5%;
            right: 10%;
            width: 70px;
            height: 70px;
            background: #ffeb3b;
            border-radius: 50%;
            box-shadow: 0 0 40px #fdfd96;
        }

        .cloud {
            position: absolute;
            background: white;
            border-radius: 50px;
            opacity: 0.9;
            animation: moveClouds linear infinite;
        }
        .cloud::before, .cloud::after {
            content: '';
            position: absolute;
            background: white;
            border-radius: 50%;
        }
        .cloud-1 { width: 100px; height: 35px; top: 10%; animation-duration: 30s; }
        .cloud-2 { width: 80px; height: 30px; top: 22%; animation-duration: 40s; animation-delay: -15s; }

        @keyframes moveClouds {
            from { left: -150px; }
            to { left: 110vw; }
        }

        .bin {
            transition: transform 0.2s;
            cursor: pointer;
            z-index: 30;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.2));
        }

        .trash-item {
            position: absolute;
            cursor: grab;
            z-index: 50;
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.3));
            touch-action: none;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .trash-item:active {
            cursor: grabbing;
            transform: scale(1.3);
        }

        .feedback-ops {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 6rem;
            color: #ff4444;
            text-shadow: 4px 4px 0px #fff;
            pointer-events: none;
            display: none;
            z-index: 100;
        }

        .confetti {
            position: absolute;
            width: 12px;
            height: 12px;
            pointer-events: none;
            z-index: 60;
        }

        .hidden-screen {
            display: none !important;
        }

        .modal {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            border: 8px solid #e9e72b;
        }

        .tree { position: absolute; bottom: 48%; z-index: 5; }
        .bench { position: absolute; bottom: 42%; left: 15%; z-index: 6; }
        .flower { position: absolute; z-index: 7; opacity: 0.9; }

        #btn-exit {
            position: absolute;
            top: 1rem;
            right: 1rem;
            z-index: 100;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ef4444;
            color: white;
            border-radius: 50%;
            font-size: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            border: 3px solid white;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="game-container" class="park-bg">
        
        <div class="sun"></div>
        <div class="cloud cloud-1"></div>
        <div class="cloud cloud-2"></div>

        <div class="tree" style="left: 5%;">
            <svg width="100" height="150" viewBox="0 0 120 180">
                <rect x="50" y="100" width="20" height="80" fill="#5d4037" />
                <circle cx="60" cy="70" r="50" fill="#2e7d32" />
            </svg>
        </div>
        <div class="tree" style="right: 5%; transform: scale(1.1);">
            <svg width="100" height="150" viewBox="0 0 120 180">
                <rect x="50" y="100" width="20" height="80" fill="#5d4037" />
                <circle cx="60" cy="70" r="50" fill="#1b5e20" />
            </svg>
        </div>
        
        <!-- Banco da Praça -->
        <div class="bench">
            <svg width="140" height="70" viewBox="0 0 150 80">
                <rect x="25" y="30" width="8" height="50" fill="#3e2723" />
                <rect x="115" y="30" width="8" height="50" fill="#3e2723" />
                <rect x="15" y="50" width="8" height="30" fill="#3e2723" />
                <rect x="125" y="50" width="8" height="30" fill="#3e2723" />
                <rect x="10" y="10" width="130" height="8" rx="2" fill="#8d6e63" />
                <rect x="10" y="20" width="130" height="8" rx="2" fill="#795548" />
                <rect x="5" y="45" width="140" height="10" rx="4" fill="#5d4037" />
            </svg>
        </div>

        <div id="flower-layer"></div>

        <div id="start-screen" class="absolute inset-0 flex flex-col items-center justify-center z-50 bg-opacity-90 text-white p-6" style="background: rgba(53, 116, 186, 0.92);">
            <h1 class="text-5xl md:text-7xl mb-6 drop-shadow-lg text-center" style="color: #e9e72b;">LIMPEZA DO PARQUE</h1>
            <p class="text-xl md:text-2xl mb-10 text-center max-w-lg">
                ARRASTE O LIXO PARA A CESTA CORRETA E DEIXE O PARQUE LINDO!
            </p>
            <button id="btn-start" class="text-white text-3xl px-16 py-5 rounded-full active:border-b-0 active:translate-y-2 transition-all" style="background: #e9e72b; color: #3574ba; border-bottom: 8px solid #c9c500;">
                COMEÇAR!
            </button>
        </div>

        <div id="hud" class="absolute top-0 left-0 w-full p-4 flex justify-between items-center z-40 hidden-screen">
            <div class="bg-white px-5 py-2 rounded-full shadow-lg text-xl md:text-2xl border-4" style="color: #3574ba; border-color: #3574ba;">
                Tempo: <span id="timer">00:00</span>
            </div>
            <button id="btn-exit" title="Sair">✕</button>
        </div>

        <div id="trash-layer" class="absolute inset-0"></div>

        <div id="bins-container" class="absolute bottom-2 left-0 w-full flex justify-around items-end px-2 h-40 hidden-screen">
            <div data-type="azul" class="bin">
                <svg width="70" height="100" viewBox="0 0 100 140">
                    <path d="M10,20 L90,20 L80,130 L20,130 Z" fill="#2563eb" stroke="#1d4ed8" stroke-width="4"/>
                    <rect x="10" y="10" width="80" height="15" rx="5" fill="#1d4ed8"/>
                    <text x="50" y="80" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">PAPEL</text>
                </svg>
            </div>
            <div data-type="vermelha" class="bin">
                <svg width="70" height="100" viewBox="0 0 100 140">
                    <path d="M10,20 L90,20 L80,130 L20,130 Z" fill="#dc2626" stroke="#b91c1c" stroke-width="4"/>
                    <rect x="10" y="10" width="80" height="15" rx="5" fill="#b91c1c"/>
                    <text x="50" y="80" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">PLÁSTICO</text>
                </svg>
            </div>
            <div data-type="verde" class="bin">
                <svg width="70" height="100" viewBox="0 0 100 140">
                    <path d="M10,20 L90,20 L80,130 L20,130 Z" fill="#16a34a" stroke="#15803d" stroke-width="4"/>
                    <rect x="10" y="10" width="80" height="15" rx="5" fill="#15803d"/>
                    <text x="50" y="80" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">VIDRO</text>
                </svg>
            </div>
            <div data-type="amarela" class="bin">
                <svg width="70" height="100" viewBox="0 0 100 140">
                    <path d="M10,20 L90,20 L80,130 L20,130 Z" fill="#eab308" stroke="#ca8a04" stroke-width="4"/>
                    <rect x="10" y="10" width="80" height="15" rx="5" fill="#ca8a04"/>
                    <text x="50" y="80" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">METAL</text>
                </svg>
            </div>
            <div data-type="marrom" class="bin">
                <svg width="70" height="100" viewBox="0 0 100 140">
                    <path d="M10,20 L90,20 L80,130 L20,130 Z" fill="#78350f" stroke="#451a03" stroke-width="4"/>
                    <rect x="10" y="10" width="80" height="15" rx="5" fill="#451a03"/>
                    <text x="50" y="80" font-family="Arial" font-size="12" fill="white" text-anchor="middle" font-weight="bold">ORGÂNICO</text>
                </svg>
            </div>
        </div>

        <div id="final-screen" class="absolute inset-0 flex items-center justify-center z-50 hidden-screen bg-black bg-opacity-50">
            <div class="modal p-10 text-center max-w-sm w-full mx-4">
                <h2 class="text-5xl mb-2" style="color: #3574ba;">UAU!</h2>
                <p class="text-xl mb-4">O parque está brilhando e as flores agradecem!</p>
                <div class="text-3xl font-bold mb-8" style="color: #3574ba;">
                    Tempo: <span id="final-time">00:00</span>
                </div>
                <button id="btn-replay" class="text-white text-xl px-10 py-4 rounded-full active:border-b-0 active:translate-y-1 transition-all" style="background: #e9e72b; color: #3574ba; border-bottom: 6px solid #c9c500;">
                    JOGAR DE NOVO
                </button>
            </div>
        </div>

        <div id="ops" class="feedback-ops">OPS!</div>

    </div>

    <script>
        // SVG da Maçã Mordida REDESENHADA (Vetor com formato de maçã e mordida clara)
        const bittenAppleSVG = `
            <svg width="60" height="60" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Formato de Maçã (mais larga no topo, afunilando em baixo) -->
                <path d="M50,30 
                         C35,30 20,35 20,55 
                         C20,80 35,95 50,95 
                         C65,95 80,80 80,55 
                         C80,35 65,30 50,30 Z" fill="#d32f2f"/>
                <!-- Brilho no topo -->
                <ellipse cx="40" cy="45" rx="8" ry="12" fill="#ff5252" opacity="0.6" transform="rotate(-15 40 45)"/>
                <!-- Cabinho -->
                <path d="M50,30 L50,15" stroke="#5d4037" stroke-width="5" stroke-linecap="round"/>
                <!-- Folhinha -->
                <path d="M50,20 C55,10 70,15 65,22 C60,30 50,20 50,20" fill="#388e3c"/>
                
                <!-- A MORDIDA (Recorte circular com cor de polpa clara) -->
                <path d="M80,45 
                         C72,45 65,50 65,58 
                         C65,66 72,71 80,71 
                         L80,45 Z" fill="#fff9c4"/>
                
                <!-- Detalhes da polpa (mordida em 'C') -->
                <circle cx="68" cy="50" r="5" fill="#fff9c4" />
                <circle cx="68" cy="66" r="5" fill="#fff9c4" />
                
                <!-- Sementinha central -->
                <ellipse cx="69" cy="58" rx="2" ry="3" fill="#3e2723" transform="rotate(10 69 58)"/>
            </svg>
        `;

        const trashData = [
            { type: 'azul', content: '📰', isEmoji: true },
            { type: 'azul', content: '📦', isEmoji: true },
            { type: 'vermelha', content: '🍼', isEmoji: true },
            { type: 'vermelha', content: '🥤', isEmoji: true },
            { type: 'verde', content: '🍾', isEmoji: true },
            { type: 'verde', content: '🍯', isEmoji: true },
            { type: 'amarela', content: '🥫', isEmoji: true },
            { type: 'marrom', content: bittenAppleSVG, isEmoji: false }, 
            { type: 'marrom', content: '🍌', isEmoji: true }
        ];

        let gameActive = false;
        let startTime = 0;
        let timerInterval;
        let itemsRemaining = 0;
        let currentDragging = null;
        let offset = { x: 0, y: 0 };
        let originalPos = { x: 0, y: 0 };

        const startScreen = document.getElementById('start-screen');
        const hud = document.getElementById('hud');
        const binsContainer = document.getElementById('bins-container');
        const trashLayer = document.getElementById('trash-layer');
        const flowerLayer = document.getElementById('flower-layer');
        const finalScreen = document.getElementById('final-screen');
        const timerDisplay = document.getElementById('timer');
        const opsFeedback = document.getElementById('ops');

        const playSound = (freq, type, duration) => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, ctx.currentTime);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                osc.stop(ctx.currentTime + duration);
            } catch(e) {}
        };

        function startTimer() {
            startTime = Date.now();
            timerInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                const minutes = Math.floor(elapsed / 60000).toString().padStart(2, '0');
                const seconds = Math.floor((elapsed % 60000) / 1000).toString().padStart(2, '0');
                timerDisplay.textContent = `${minutes}:${seconds}`;
            }, 1000);
        }

        function spawnFlowers() {
            flowerLayer.innerHTML = '';
            const flowerColors = ['#FF69B4', '#FFD700', '#FF4500', '#9370DB', '#FFFFFF'];
            for(let i=0; i<15; i++) {
                const f = document.createElement('div');
                f.className = 'flower';
                f.style.left = Math.random() * 90 + '%';
                f.style.top = (52 + Math.random() * 38) + '%';
                const color = flowerColors[Math.floor(Math.random() * flowerColors.length)];
                f.innerHTML = `<svg width="20" height="20" viewBox="0 0 20 20">
                    <circle cx="10" cy="10" r="4" fill="#FFFF00" />
                    <circle cx="10" cy="5" r="4" fill="${color}" />
                    <circle cx="10" cy="15" r="4" fill="${color}" />
                    <circle cx="5" cy="10" r="4" fill="${color}" />
                    <circle cx="15" cy="10" r="4" fill="${color}" />
                </svg>`;
                flowerLayer.appendChild(f);
            }
        }

        function spawnTrash() {
            trashLayer.innerHTML = '';
            const list = [];
            for(let i=0; i<10; i++) {
                list.push(trashData[Math.floor(Math.random() * trashData.length)]);
            }
            itemsRemaining = list.length;

            const positions = [];
            const minDistance = 90; // Aumentado para garantir maior esparramamento

            list.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'trash-item select-none';
                if (item.isEmoji) {
                    div.innerHTML = item.content;
                    div.classList.add('text-5xl', 'md:text-6xl');
                } else {
                    div.innerHTML = item.content;
                }
                div.dataset.type = item.type;
                
                let x, y, found = false;
                let attempts = 0;
                
                while (!found && attempts < 100) {
                    x = 8 + Math.random() * 80; 
                    y = 52 + Math.random() * 20; 
                    
                    const pxX = (window.innerWidth * x) / 100;
                    const pxY = (window.innerHeight * y) / 100;
                    
                    found = positions.every(p => {
                        const dx = p.x - pxX;
                        const dy = p.y - pxY;
                        return Math.sqrt(dx*dx + dy*dy) > minDistance;
                    });
                    
                    if (found || attempts === 99) {
                        positions.push({x: pxX, y: pxY});
                        found = true;
                    }
                    attempts++;
                }
                
                div.style.left = x + '%';
                div.style.top = y + '%';
                
                div.addEventListener('mousedown', startDrag);
                div.addEventListener('touchstart', startDrag, { passive: false });
                
                trashLayer.appendChild(div);
            });
        }

        function startDrag(e) {
            if (!gameActive) return;
            if (e.cancelable) e.preventDefault();
            
            currentDragging = e.currentTarget;
            currentDragging.style.transition = 'none';
            
            const clientX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
            
            const rect = currentDragging.getBoundingClientRect();
            offset.x = clientX - rect.left;
            offset.y = clientY - rect.top;
            
            originalPos.x = currentDragging.style.left;
            originalPos.y = currentDragging.style.top;
            
            currentDragging.style.zIndex = 1000;
            
            const moveEvent = e.type === 'touchstart' ? 'touchmove' : 'mousemove';
            const endEvent = e.type === 'touchstart' ? 'touchend' : 'mouseup';

            const onMove = (me) => drag(me);
            const onEnd = (ee) => {
                document.removeEventListener(moveEvent, onMove);
                document.removeEventListener(endEvent, onEnd);
                endDrag(ee);
            };

            document.addEventListener(moveEvent, onMove, { passive: false });
            document.addEventListener(endEvent, onEnd);
        }

        function drag(e) {
            if (!currentDragging) return;
            if (e.cancelable) e.preventDefault();
            const clientX = e.type === 'touchmove' ? e.touches[0].clientX : e.clientX;
            const clientY = e.type === 'touchmove' ? e.touches[0].clientY : e.clientY;
            
            currentDragging.style.left = (clientX - offset.x) + 'px';
            currentDragging.style.top = (clientY - offset.y) + 'px';
        }

        function endDrag(e) {
            if (!currentDragging) return;
            
            const rect = currentDragging.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            let dropped = false;
            const bins = document.querySelectorAll('.bin');
            
            bins.forEach(bin => {
                const binRect = bin.getBoundingClientRect();
                if (centerX > binRect.left && centerX < binRect.right && 
                    centerY > binRect.top && centerY < binRect.bottom) {
                    
                    if (bin.dataset.type === currentDragging.dataset.type) {
                        handleSuccess(bin);
                        dropped = true;
                    } else {
                        handleError();
                        dropped = false;
                    }
                }
            });

            if (!dropped) {
                currentDragging.style.transition = 'all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
                currentDragging.style.left = originalPos.x;
                currentDragging.style.top = originalPos.y;
                currentDragging.style.zIndex = 50;
            }

            currentDragging = null;
        }

        function handleSuccess(bin) {
            const item = currentDragging;
            item.style.pointerEvents = 'none';
            item.style.transition = 'all 0.3s';
            item.style.transform = 'scale(0) rotate(180deg)';
            item.style.opacity = '0';
            
            setTimeout(() => item.remove(), 300);
            
            itemsRemaining--;
            createConfetti(bin.getBoundingClientRect());
            playSound(600, 'sine', 0.2);
            setTimeout(() => playSound(800, 'sine', 0.2), 50);

            if (itemsRemaining === 0) {
                victory();
            }
        }

        function handleError() {
            opsFeedback.style.display = 'block';
            playSound(150, 'sawtooth', 0.4);
            setTimeout(() => {
                opsFeedback.style.display = 'none';
            }, 600);
        }

        function createConfetti(rect) {
            for (let i = 0; i < 20; i++) {
                const conf = document.createElement('div');
                conf.className = 'confetti';
                conf.style.left = (rect.left + rect.width / 2) + 'px';
                conf.style.top = rect.top + 'px';
                conf.style.backgroundColor = ['#ff0', '#f0f', '#0ff', '#f00', '#0f0', '#fff'][Math.floor(Math.random()*6)];
                conf.style.borderRadius = '50%';
                document.body.appendChild(conf);

                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 100;
                const tx = Math.cos(angle) * dist;
                const ty = Math.sin(angle) * dist - 80;

                conf.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${tx}px, ${ty}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 1000,
                    easing: 'ease-out'
                }).onfinish = () => conf.remove();
            }
        }

        function victory() {
            gameActive = false;
            clearInterval(timerInterval);
            document.getElementById('final-time').textContent = timerDisplay.textContent;
            setTimeout(() => {
                finalScreen.classList.remove('hidden-screen');
                playSound(500, 'square', 0.1);
                setTimeout(() => playSound(600, 'square', 0.1), 100);
                setTimeout(() => playSound(700, 'square', 0.3), 200);
            }, 600);
        }

        function initGame() {
            startScreen.classList.add('hidden-screen');
            finalScreen.classList.add('hidden-screen');
            hud.classList.remove('hidden-screen');
            binsContainer.classList.remove('hidden-screen');
            gameActive = true;
            spawnFlowers();
            spawnTrash();
            startTimer();
        }

        function exitGame() {
            clearInterval(timerInterval);
            startScreen.classList.remove('hidden-screen');
            hud.classList.add('hidden-screen');
            binsContainer.classList.add('hidden-screen');
            finalScreen.classList.add('hidden-screen');
            trashLayer.innerHTML = '';
            gameActive = false;
        }

        document.getElementById('btn-start').onclick = initGame;
        document.getElementById('btn-replay').onclick = initGame;
        document.getElementById('btn-exit').onclick = exitGame;

    </script>
</body>
</html>
