<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Lucro ou Prejuízo?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #5a9fd4 0%, #3574ba 100%);
            overscroll-behavior: none;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.2);
        }
        .btn-option {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-option:active {
            transform: scale(0.95);
        }
        .hidden { display: none; }
        .fade-in { animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .btn-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: #ff4d4d;
            color: white;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
            cursor: pointer;
            border: none;
        }
        .content-padding {
            padding-top: 3rem;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <!-- Main Container -->
    <div id="game-container" class="relative w-full max-w-md glass-card p-6 md:p-8 min-h-[550px] flex flex-col justify-between overflow-hidden">
        
        <!-- Close Button (X) -->
        <button onclick="closeGame()" class="btn-close" aria-label="Fechar">✕</button>

        <!-- Start Screen -->
        <div id="start-screen" class="flex flex-col items-center text-center space-y-8 fade-in content-padding">
            <div class="text-7xl">💰</div>
            <h1 class="text-4xl md:text-5xl font-bold leading-tight" style="color: #3574ba;">Lucro ou Prejuízo?</h1>
            <p class="text-xl md:text-2xl text-gray-600 font-medium">Vamos aprender a lidar com o dinheiro de um jeito divertido!</p>
            
            <div class="p-5 rounded-2xl text-left text-base md:text-lg space-y-3 w-full" style="background: #eef6ff; border-left: 4px solid #3574ba;">
                <p>✅ <strong>Lucro:</strong> Ganhar mais do que gastou!</p>
                <p>❌ <strong>Prejuízo:</strong> Gastar mais do que ganhou!</p>
            </div>

            <button onclick="startGame()" class="w-full font-extrabold py-5 rounded-3xl text-2xl shadow-xl transition-all hover:scale-105 active:scale-95" style="background: #e9e72b; color: #3574ba;">
                COMEÇAR JOGO! 🚀
            </button>
        </div>

        <!-- Question Screen -->
        <div id="question-screen" class="hidden flex-col h-full space-y-6 fade-in content-padding">
            <div class="flex justify-between items-center pr-12"> 
                <span class="px-4 py-1.5 rounded-full text-sm font-bold" id="progress-text" style="background: #dbe9f5; color: #3574ba;">Pergunta 1/5</span>
                <span class="font-bold text-green-600 text-base" id="score-display">Acertos: 0</span>
            </div>
            
            <div class="flex-grow">
                <div class="bg-blue-50 p-6 rounded-2xl border-2 border-blue-100 mb-6">
                    <p id="situation-text" class="text-xl text-blue-900 leading-relaxed font-semibold"></p>
                </div>

                <div class="grid grid-cols-1 gap-4" id="options-container">
                    <!-- Buttons will be injected here -->
                </div>
            </div>
        </div>

        <!-- Feedback Overlay -->
        <div id="feedback-screen" class="hidden flex-col items-center text-center space-y-6 fade-in content-padding">
            <div id="feedback-icon" class="text-8xl"></div>
            <h2 id="feedback-title" class="text-3xl font-bold"></h2>
            <div id="feedback-explanation" class="bg-white p-5 rounded-2xl shadow-inner text-gray-700 text-lg italic border-2 border-gray-100"></div>
            <button onclick="nextQuestion()" class="w-full text-white font-bold py-5 rounded-3xl text-2xl" style="background: #3574ba;">
                CONTINUAR ➔
            </button>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden flex-col items-center text-center space-y-8 fade-in content-padding">
            <div class="text-8xl">🏆</div>
            <h2 class="text-4xl font-bold" style="color: #3574ba;">Fim de Jogo!</h2>
            <div class="space-y-2">
                <p class="text-2xl">Você acertou <span id="final-score" class="font-bold text-green-600">0</span> de <span id="total-questions">0</span>!</p>
                <div id="performance-msg" class="text-xl text-gray-600"></div>
            </div>
            <button onclick="restartGame()" class="w-full text-white font-bold py-5 rounded-3xl text-2xl shadow-lg transition-colors" style="background: #e9e72b; color: #3574ba;">
                JOGAR NOVAMENTE 🔄
            </button>
        </div>

    </div>

    <!-- Exit Confirmation -->
    <div id="exit-modal" class="fixed inset-0 bg-black/50 flex items-center justify-center p-4 hidden z-[200]">
        <div class="bg-white p-8 rounded-3xl max-w-xs text-center space-y-6">
            <h3 class="text-2xl font-bold text-gray-800">Deseja sair do jogo?</h3>
            <p class="text-gray-600">Todo o seu progresso será perdido!</p>
            <div class="flex gap-4">
                <button onclick="toggleExitModal(false)" class="flex-1 bg-gray-200 py-3 rounded-2xl font-bold text-lg">Não</button>
                <button onclick="window.location.reload()" class="flex-1 bg-red-500 text-white py-3 rounded-2xl font-bold text-lg">Sim, Sair</button>
            </div>
        </div>
    </div>

    <script>
        const questions = [
            {
                situation: "Maria vendeu 3 pulseiras que ela fez. Ela gastou R$ 6,00 nos materiais e vendeu por R$ 12,00. O que aconteceu?",
                options: ["Lucro", "Prejuízo"],
                answer: 0,
                explanation: "Maria teve LUCRO! 🎉 Ela gastou R$ 6,00 e ganhou R$ 12,00. Lucro = R$ 12,00 - R$ 6,00 = R$ 6,00. Ela ganhou mais do que gastou!"
            },
            {
                situation: "João comprou um brinquedo por R$ 15,00 para revender, mas só conseguiu vender por R$ 10,00 para um amigo. O que aconteceu?",
                options: ["Lucro", "Prejuízo"],
                answer: 1,
                explanation: "João teve PREJUÍZO! 😔 Ele gastou R$ 15,00 e só recebeu R$ 10,00. Prejuízo = R$ 15,00 - R$ 10,00 = R$ 5,00. Ele gastou mais do que ganhou!"
            },
            {
                situation: "Bia fez Slime. Ela gastou R$ 8,00 com os materiais. Vendeu o Slime por exatamente R$ 8,00. O que aconteceu?",
                options: ["Lucro", "Prejuízo", "Nem lucro, nem prejuízo"],
                answer: 2,
                explanation: "Bia ficou no ZERO! ⚖️ Ela gastou R$ 8,00 e recebeu R$ 8,00. Não ganhou dinheiro extra, mas também não perdeu o que investiu."
            },
            {
                situation: "Pedro vendeu limonada. Gastou R$ 10,00 com limões e açúcar. No final do dia, ele tinha R$ 25,00 no seu potinho. O que aconteceu?",
                options: ["Lucro", "Prejuízo"],
                answer: 0,
                explanation: "LUCRO TOTAL! 🍋 Ele investiu R$ 10,00 e sobrou com R$ 25,00. Teve um lucro de R$ 15,00. Parabéns, Pedro!"
            },
            {
                situation: "Ana comprou doces por R$ 20,00. Mas esqueceu os doces no sol e derreteram. Ela não conseguiu vender nenhum. O que aconteceu?",
                options: ["Lucro", "Prejuízo"],
                answer: 1,
                explanation: "Isso é PREJUÍZO! 💸 Ela gastou R$ 20,00 e não recebeu nada de volta. O valor total gasto foi perdido."
            }
        ];

        let currentIdx = 0;
        let score = 0;

        function startGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('question-screen').classList.remove('hidden');
            showQuestion();
        }

        function showQuestion() {
            const q = questions[currentIdx];
            document.getElementById('progress-text').textContent = `Pergunta ${currentIdx + 1}/${questions.length}`;
            document.getElementById('situation-text').textContent = q.situation;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            q.options.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "btn-option w-full py-5 px-6 text-left rounded-3xl border-2 hover:bg-blue-50 font-bold flex justify-between items-center text-lg";
                btn.style.cssText = "border-color: #a8cce8; color: #3574ba;";
                btn.innerHTML = `<span>${opt}</span> <span class="text-2xl">👉</span>`;
                btn.onclick = () => checkAnswer(index);
                container.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            const q = questions[currentIdx];
            const isCorrect = choice === q.answer;
            
            if(isCorrect) score++;
            
            document.getElementById('question-screen').classList.add('hidden');
            document.getElementById('feedback-screen').classList.remove('hidden');
            
            document.getElementById('feedback-icon').textContent = isCorrect ? "🌟" : "💡";
            document.getElementById('feedback-title').textContent = isCorrect ? "Acertou em cheio!" : "Quase lá...";
            document.getElementById('feedback-title').className = `text-3xl font-bold ${isCorrect ? 'text-green-600' : 'text-orange-500'}`;
            document.getElementById('feedback-explanation').textContent = q.explanation;
            document.getElementById('score-display').textContent = `Acertos: ${score}`;
        }

        function nextQuestion() {
            currentIdx++;
            document.getElementById('feedback-screen').classList.add('hidden');
            
            if(currentIdx < questions.length) {
                document.getElementById('question-screen').classList.remove('hidden');
                showQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score').textContent = score;
            document.getElementById('total-questions').textContent = questions.length;
            
            const msg = document.getElementById('performance-msg');
            if(score === questions.length) msg.textContent = "Incrível! Você é um mestre das finanças! 💰👑";
            else if(score >= questions.length / 2) msg.textContent = "Muito bem! Você entende bem como o dinheiro funciona! 😊";
            else msg.textContent = "Continue praticando! Logo você saberá tudo sobre lucro! 💪";
        }

        function restartGame() {
            currentIdx = 0;
            score = 0;
            document.getElementById('score-display').textContent = `Acertos: 0`;
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('start-screen').classList.remove('hidden');
        }

        function closeGame() {
            toggleExitModal(true);
        }

        function toggleExitModal(show) {
            document.getElementById('exit-modal').classList.toggle('hidden', !show);
        }
    </script>
</body>
</html>
