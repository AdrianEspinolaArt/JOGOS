<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DESAFIO DOS BALÕES</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a84191;
            --primary-dark: #8a3578;
            --secondary: #61c6ee;
            --danger-color: #FF3131;
            --success-color: #2ca95e;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            text-transform: uppercase; /* FORÇA TUDO EM CAIXA ALTA */
        }

        body {
            font-family: 'Fredoka One', cursive;
            background: linear-gradient(135deg, #7dd3f0 0%, #61c6ee 100%);
            color: var(--text-color);
            overflow: hidden;
            touch-action: none;
            text-transform: uppercase;
        }

        #cenario {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(180deg, #f0e6f5 0%, #e4d0ef 100%);
        }

        /* Botão Fechar */
        .btn-fechar {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 36px;
            height: 36px;
            background: var(--danger-color);
            border: 2px solid white;
            border-radius: 50%;
            color: white;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 1000;
            box-shadow: none;
        }

        /* Telas Principais */
        .tela {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            z-index: 500;
        }

        #tela-inicio { background: linear-gradient(135deg, #7dd3f0 0%, #61c6ee 100%); }

        #tela-fim { background: linear-gradient(135deg, #7dd3f0 0%, #61c6ee 100%); }

        .moldura {
            background: white;
            padding: 30px 24px;
            border-radius: 24px;
            border: 5px solid var(--secondary);
            box-shadow: none;
            max-width: 760px;
            width: 92%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #tela-fim .moldura { border-color: var(--secondary); }

        .escondido { display: none !important; }

        h1 {
            font-size: clamp(1.6rem, 7vw, 2.4rem);
            color: var(--primary);
            text-shadow: 2px 2px 0 rgba(255,255,255,0.6);
            margin-bottom: 20px;
            line-height: 1.1;
        }

        p {
            font-size: clamp(1rem, 4.4vw, 1.35rem);
            margin-bottom: 30px;
            line-height: 1.3;
            color: var(--text-color);
        }

        .btn-principal {
            background: var(--primary);
            color: white;
            border: 3px solid white;
            padding: 14px 36px;
            font-size: clamp(1rem, 4vw, 1.45rem);
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px var(--primary-dark);
            font-family: 'Fredoka One', cursive;
            transition: all 0.1s;
        }

        .btn-principal:active {
            transform: translateY(3px);
            box-shadow: 0 1px var(--primary-dark);
        }

        /* Balão Grande para Leitura */
        .balao-container {
            position: absolute;
            width: 190px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 8px 18px rgba(0,0,0,0.18));
        }

        .balao-corpo {
            position: relative;
            width: 175px;
            height: 210px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 25px;
            text-align: center;
            font-weight: 600;
            font-size: 1.25rem;
            color: white;
            border: 4px solid rgba(255,255,255,0.4);
            box-shadow: inset -15px -15px 30px rgba(0,0,0,0.2);
            text-shadow: 0 2px 4px rgba(0,0,0,0.3);
            line-height: 1.1;
        }

        .balao-corda {
            width: 3px;
            height: 70px;
            background: rgba(255,255,255,0.6);
            position: relative;
        }

        .balao-no {
            width: 14px;
            height: 10px;
            background: inherit;
            border-radius: 4px;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
            z-index: 400;
        }

        .info-box {
            background: white;
            padding: 8px 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 2px 0 var(--primary-dark);
            border: 3px solid var(--primary);
        }

        /* Feedback Pop */
        .feedback-pop {
            position: absolute;
            pointer-events: none;
            font-size: 2.5rem;
            font-weight: bold;
            z-index: 600;
            animation: popUp 0.8s forwards;
            text-shadow: 0 4px 12px rgba(0,0,0,0.4);
        }

        .icone-inicio {
            font-size: 80px;
            margin-bottom: 10px;
        }

        .info-pontos { color: var(--success-color); }
        .info-tempo { color: #e67e22; }

        .pontos-finais-wrap {
            font-size: 4rem;
            color: var(--success-color);
            font-weight: bold;
            margin: 10px 0;
        }

        @media (max-width: 480px) {
            .moldura {
                padding: 24px 16px;
                width: 95%;
            }

            .balao-container {
                width: 158px;
            }

            .balao-corpo {
                width: 145px;
                height: 180px;
                font-size: 1.05rem;
                padding: 18px;
            }

            #hud {
                top: 12px;
                left: 12px;
            }

            .icone-inicio {
                font-size: 64px;
            }
        }

        @keyframes popUp {
            0% { transform: scale(0.5); opacity: 1; }
            100% { transform: scale(1.8) translateY(-70px); opacity: 0; }
        }

    </style>
</head>
<body>

    <div id="cenario">
        <button class="btn-fechar" onclick="location.reload()">✕</button>

        <!-- HUD -->
            <div id="hud" class="escondido">
            <div class="info-box info-pontos">🌟 PONTOS: <span id="val-pontos">0</span></div>
            <div class="info-box info-tempo">⏳ TEMPO: <span id="val-tempo">45</span>S</div>
        </div>

        <!-- Tela Inicial -->
        <div id="tela-inicio" class="tela">
            <div class="moldura">
                <div class="icone-inicio">🎈</div>
                <h1>BALÕES DA GRATIDÃO</h1>
                <p>
                    <b>LEIA COM ATENÇÃO:</b> <br><br>
                    ESTOURE APENAS OS BALÕES QUE DIZEM <b>COISAS BOAS</b>. <br>
                    DEIXE AS RECLAMAÇÕES SUBIREM!
                </p>
                <button class="btn-principal" onclick="começarJogo()">VAMOS LÁ!</button>
            </div>
        </div>

        <!-- Tela Final -->
        <div id="tela-fim" class="tela escondido">
            <div class="moldura">
                <h1 id="fim-titulo">TEMPO ESGOTADO!</h1>
                <p id="fim-texto">VOCÊ FOI INCRÍVEL!</p>
                <div class="pontos-finais-wrap">
                    <span id="pontos-finais">0</span>
                </div>
                <button class="btn-principal" onclick="location.reload()">JOGAR DE NOVO</button>
            </div>
        </div>
    </div>

    <script>
        const frasesGratidao = [
            "QUE BOM QUE TENHO AMIGOS!",
            "EU AMO A MINHA FAMÍLIA.",
            "SOU GRATO POR PODER ESTUDAR.",
            "SOU FELIZ PORQUE TENHO SAÚDE.",
            "ADORO MINHA PROFESSORA!",
            "GOSTO MUITO DE IR PARA A ESCOLA.",
            "TENHO TUDO QUE PRECISO.",
            "EU ME SINTO MUITO BEM HOJE."
        ];

        const frasesReclamacao = [
            "NÃO GOSTO DESSA COMIDA.",
            "NÃO QUERO ESTUDAR.",
            "ODEIO FAZER PROVA!",
            "DETESTO TANTO CALOR.",
            "ESSA ROUPA É FEIA!",
            "MEUS TÊNIS ESTÃO APERTADOS.",
            "ESSA CADEIRA É DURA.",
            "ISSO TEM GOSTO RUIM"
        ];

        const coresBaloes = [
            "#FF6B6B", "#4ECDC4", "#FF9F43", 
            "#4D96FF", "#9B59B6", "#F1C40F", "#E67E22",
            "#1ABC9C", "#D35400", "#C0392B", "#27AE60"
        ];

        let pontos = 0;
        let acertos = 0;
        let erros = 0;
        let tempo = 45;
        let jogoAtivo = false;
        const cenario = document.getElementById('cenario');
        const valPontos = document.getElementById('val-pontos');
        const valTempo = document.getElementById('val-tempo');

        function começarJogo() {
            document.getElementById('tela-inicio').classList.add('escondido');
            document.getElementById('hud').classList.remove('escondido');
            
            jogoAtivo = true;
            pontos = 0;
            acertos = 0;
            erros = 0;
            tempo = 45;
            valPontos.innerText = pontos;
            valTempo.innerText = tempo;

            const interval = setInterval(() => {
                if (!jogoAtivo) {
                    clearInterval(interval);
                    return;
                }
                tempo--;
                valTempo.innerText = tempo;
                if (tempo <= 0) encerrarJogo();
            }, 1000);

            loopCriacao();
        }

        function loopCriacao() {
            if (!jogoAtivo) return;
            criarBalao();
            const proximo = Math.max(700, 1800 - (45 - tempo) * 20);
            setTimeout(loopCriacao, proximo);
        }

        function criarBalao() {
            const ehGratidao = Math.random() > 0.4;
            const frases = ehGratidao ? frasesGratidao : frasesReclamacao;
            const frase = frases[Math.floor(Math.random() * frases.length)];
            const corAleatoria = coresBaloes[Math.floor(Math.random() * coresBaloes.length)];

            const container = document.createElement('div');
            container.className = 'balao-container';
            
            container.innerHTML = `
                <div class="balao-corpo" style="background-color: ${corAleatoria}">${frase}</div>
                <div class="balao-corda"><div class="balao-no" style="background-color: ${corAleatoria}"></div></div>
            `;

            const larguraBalao = 190;
            const xAleatorio = Math.random() * (window.innerWidth - larguraBalao);
            container.style.left = xAleatorio + 'px';
            container.style.bottom = '-300px';

            container.onclick = (e) => {
                if (!jogoAtivo) return;
                estourarBalao(ehGratidao, container, e.clientX, e.clientY);
            };

            cenario.appendChild(container);

            const velocidade = 6000 + Math.random() * 3000;
            const animacao = container.animate([
                { bottom: '-300px', transform: 'translateX(0px) rotate(0deg)' },
                { bottom: '110vh', transform: `translateX(${(Math.random() - 0.5) * 150}px) rotate(${(Math.random() - 0.5) * 25}deg)` }
            ], {
                duration: velocidade,
                easing: 'linear'
            });

            animacao.onfinish = () => {
                if (container.parentNode) container.remove();
            };
        }

        function estourarBalao(ehGratidao, elemento, x, y) {
            const feed = document.createElement('div');
            feed.className = 'feedback-pop';
            feed.style.left = x + 'px';
            feed.style.top = y + 'px';

            if (ehGratidao) {
                pontos += 10;
                acertos++;
                feed.innerText = "🎈 VIVA!";
                feed.style.color = "#27ae60";
            } else {
                pontos = Math.max(0, pontos - 5);
                erros++;
                feed.innerText = "💥 OPS...";
                feed.style.color = "#e74c3c";
                
                cenario.animate([
                    { transform: 'translateX(0)' },
                    { transform: 'translateX(-10px)' },
                    { transform: 'translateX(10px)' },
                    { transform: 'translateX(0)' }
                ], { duration: 120 });
            }

            valPontos.innerText = pontos;
            cenario.appendChild(feed);
            
            elemento.style.transform = "scale(1.5)";
            elemento.style.opacity = "0";
            setTimeout(() => {
                elemento.remove();
                feed.remove();
            }, 500);
        }

        function encerrarJogo() {
            jogoAtivo = false;
            document.getElementById('hud').classList.add('escondido');
            document.getElementById('tela-fim').classList.remove('escondido');
            document.getElementById('pontos-finais').innerText = pontos;

            const titulo = document.getElementById('fim-titulo');
            const texto = document.getElementById('fim-texto');
            
            const totalClicados = acertos + erros;

            // LÓGICA DE FEEDBACK PERSONALIZADA
            if (totalClicados < 8) {
                titulo.innerText = "PROCURE SE ESFORÇAR.";
                texto.innerText = "VOCÊ ESTÁ NO CAMINHO CERTO.";
            } else if (erros > acertos) {
                titulo.innerText = "FIQUE ATENTO!";
                texto.innerText = "VOCÊ DEVE ESCOLHER FRASES DE GRATIDÃO. TENTE NOVAMENTE.";
            } else if (acertos >= 12) {
                titulo.innerText = "PARABÉNS!";
                texto.innerText = "VOCÊ SABE O QUE É GRATIDÃO!";
            } else {
                // Caso médio (equilibrado ou poucos acertos mas sem muitos erros)
                titulo.innerText = "BOM TRABALHO!";
                texto.innerText = "CONTINUE PRATICANDO A GRATIDÃO!";
            }

            document.querySelectorAll('.balao-container').forEach(b => b.remove());
        }

        document.addEventListener('touchstart', function (event) {
            if (event.touches.length > 1) {
                event.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
